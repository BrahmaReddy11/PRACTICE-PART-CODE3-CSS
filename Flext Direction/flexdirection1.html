<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>flexdirection</title>
</head>
<body>
    <center>
        <u>
            <mark>display-flex: flex</mark>
            <br>
            <mark>flex direction: row</mark>
        </u>
    </center>
    <div class="flex1">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
    <hr><hr>
    <center>
        <u>
            <mark>display-flex: flex</mark>
            <br>
            <mark>flex direction: column</mark>
        </u>
    </center>
    <div class="flex2">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
    <hr>
    <hr>
    <center>
        <u>
            <mark>display-flex: flex</mark>
            <br>
            <mark>flex direction: row-reverse</mark>
        </u>
    </center>
    <div class="flex3">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
    <hr>
    <hr>
    <center>
        <u>
            <mark>display-flex: flex</mark>
            <br>
            <mark>flex direction: column-reverse</mark>
        </u>
    </center>
    <div class="flex4">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
    </div>
    <link rel="stylesheet" href="flexdirection1.css">
</body>
</html>
